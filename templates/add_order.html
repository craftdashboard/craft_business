<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Add Order</title>
</head>
<body class="bg-light p-5">
    <div class="container card p-4 shadow-sm" style="max-width: 500px;">
        <h4>Enter New Order Details</h4><hr>
        <form method="POST">
            <div class="mb-3"><label class="form-label">Customer Name</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Item / Gift Hamper Name</label><input type="text" name="item" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Selling Price (₹)</label><input type="number" name="total" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Advance Paid (₹)</label><input type="number" name="advance" class="form-control" value="0"></div>
            <div class="mb-3"><label class="form-label">Material / Expense Cost (₹)</label><input type="number" name="expense" class="form-control" value="0"></div>
            <button type="submit" class="btn btn-success w-100">Confirm & Save Order</button>
        </form>
        <a href="/" class="btn btn-link w-100 text-center mt-2">Back to Dashboard</a>
    </div>
</body>
</html>
