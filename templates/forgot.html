<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Reset Password - Space Craft</title>
    <style>
        body { background: radial-gradient(circle at center, #003333 0%, #001a1a 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border-radius: 30px; padding: 40px 30px; width: 100%; max-width: 420px; backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 255, 0.2); box-shadow: 0 0 40px rgba(0, 255, 255, 0.1); text-align: center; }
        .logo-text { font-size: 38px; font-weight: bold; color: #ffffff; letter-spacing: 5px; text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); margin-bottom: 5px; }
        .sub-text { color: #b0c4de; font-size: 18px; margin-bottom: 30px; }
        .form-label { color: #e0ffff; font-size: 14px; text-align: left; display: block; margin-bottom: 5px; padding-left: 5px; }
        .form-control { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(0, 255, 255, 0.3) !important; border-radius: 12px; color: #ffffff !important; padding: 12px; margin-bottom: 20px; }
        .btn-cyan { background: linear-gradient(90deg, #17a2b8, #008b8b); border: none; border-radius: 12px; color: white; padding: 12px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3); }
        .links a { color: #00ffff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="glass-card mx-3">
        <div class="logo-text">SPACE</div>
        <div class="sub-text">Reset Password</div>
        
        {% if error %}
            <div class="alert alert-danger py-2" style="background: rgba(255,0,0,0.2); border: 1px solid red; color: #ffcccc;">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert alert-success py-2" style="background: rgba(0,255,0,0.2); border: 1px solid green; color: #ccffcc;">{{ success }}</div>
        {% endif %}
        
        <form method="POST">
            <div>
                <label class="form-label">Your Registered Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>
            <div>
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
            </div>
            <button type="submit" class="btn btn-cyan w-100 mb-4">Reset Password</button>
            <div class="links">
                <a href="/login" class="fw-bold">Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
