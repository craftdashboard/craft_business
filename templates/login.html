<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Login - Space Craft</title>
    <style>
        body {
            background: radial-gradient(circle at center, #003333 0%, #001a1a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .logo-text {
            font-size: 38px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .sub-text {
            color: #b0c4de;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .form-label {
            color: #e0ffff;
            font-size: 14px;
            text-align: left;
            display: block;
            margin-bottom: 5px;
            padding-left: 5px;
        }
        .form-control {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(0, 255, 255, 0.3) !important;
            border-radius: 12px;
            color: #ffffff !important;
            padding: 12px;
            margin-bottom: 20px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .form-control:focus {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            border-color: #00ffff !important;
        }
        .btn-cyan {
            background: linear-gradient(90deg, #17a2b8, #008b8b);
            border: none;
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
            transition: 0.3s;
        }
        .btn-cyan:hover {
            box-shadow: 0 4px 25px rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        .links a {
            color: #00ffff;
            text-decoration: none;
            font-size: 14px;
        }
        .links a:hover {
            text-shadow: 0 0 8px #00ffff;
        }
    </style>
</head>
<body>

    <div class="glass-card mx-3">
        <div class="logo-text">SPACE</div>
        <div class="sub-text">Welcome Back</div>
        
        {% if error %}
            <div class="alert alert-danger py-2" style="background: rgba(255,0,0,0.2); border: 1px solid red; color: #ffcccc; font-size:14px; border-radius:10px;">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div>
                <label class="form-label">Username or Email address</label>
                <input type="text" name="login_input" class="form-control" placeholder="username or email" required autocomplete="off">
            </div>
            <div>
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••••••" required>
            </div>
            
            <div class="text-start mb-3 links" style="margin-top: -10px;">
                <a href="/forgot">Forget Password ?</a>
            </div>
            
            <button type="submit" class="btn btn-cyan w-100 mb-4">Login</button>
            
            <div class="text-white-50 links" style="font-size: 14px;">
                Are You New Member? <a href="/signup" class="fw-bold">Sign UP</a>
            </div>
        </form>
    </div>

</body>
</html>
